name: Build Lanzarus APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Permisos gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Crear .env
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build Release APK
        env:
          STORE_PASSWORD: Lanzarus2026!
          KEY_PASSWORD: Lanzarus2026!
          KEY_ALIAS: upload
          KEYSTORE_PATH: ${{ github.workspace }}/app/my-upload-key.jks
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Preparar APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/release/ -name '*.apk' | head -1 | xargs -I{} cp {} output/Lanzarus-v${{ github.run_number }}.apk

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Lanzarus-APK-v${{ github.run_number }}
          path: output/Lanzarus-v${{ github.run_number }}.apk
          retention-days: 30

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Lanzarus v1.0.${{ github.run_number }}"
          files: output/Lanzarus-v${{ github.run_number }}.apk
          body: |
            Lanzarus APK - build automatica ${{ github.run_number }}
            Instalacion: Ajustes > Seguridad > Fuentes desconocidas > instalar APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
