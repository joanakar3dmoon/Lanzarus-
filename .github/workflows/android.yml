name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          export STORE_PASSWORD='Lanzarus2026!'
          export KEY_PASSWORD='Lanzarus2026!'
          export KEYSTORE_PATH=${GITHUB_WORKSPACE}/app/my-upload-key.jks
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lanzarus-APK
          path: app/build/outputs/apk/release/*.apk
