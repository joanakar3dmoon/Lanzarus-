name: Build Lanzarus APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Permisos gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Crear .env
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build Release APK
        env:
          STORE_PASSWORD: Lanzarus2026!
          KEY_PASSWORD: Lanzarus2026!
          KEY_ALIAS: upload
          KEYSTORE_PATH: ${{ github.workspace }}/app/my-upload-key.jks
        run: ./gradlew assembleRelease --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Lanzarus-APK-v${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
