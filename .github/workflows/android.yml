name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v -keystore lanzarus.keystore -alias lanzarus -keyalg RSA -keysize 2048 -validity 10000 -storepass r3dmoon2026 -keypass r3dmoon2026 -dname "CN=Lanzarus, OU=Dev, O=Joan, L=Barcelona, S=BCN, C=ES"
          echo "Keystore created"
          ls -lh lanzarus.keystore

      - name: Build Release APK
        run: |
          export STORE_PASSWORD=r3dmoon2026
          export KEY_PASSWORD=r3dmoon2026
          export KEY_ALIAS=lanzarus
          export KEYSTORE_PATH=${GITHUB_WORKSPACE}/lanzarus.keystore
          ./gradlew assembleRelease
          
      - name: Verify APK signature
        run: |
          APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
          unzip -l "$APK" | grep "META-INF.*RSA" || echo "NO SIGNATURE FILES"
          jarsigner -verify -verbose "$APK" 2>&1 | tail -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lanzarus-APK
          path: app/build/outputs/apk/release/*.apkname: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Generate release keystore
        run: |
          keytool -genkeypair -v -keystore lanzarus.keystore -alias lanzarus -keyalg RSA -keysize 2048 -validity 10000 -storepass r3dmoon2026 -keypass r3dmoon2026 -dname "CN=Joan R3DMOON, OU=Dev, O=Lanzarus, L=Barcelona, ST=BCN, C=ES"
      - name: Build Release APK
        run: |
          export STORE_PASSWORD=r3dmoon2026
          export KEY_PASSWORD=r3dmoon2026
          export KEY_ALIAS=lanzarus
          export KEYSTORE_PATH=$GITHUB_WORKSPACE/lanzarus.keystore
          ./gradlew assembleRelease
      - name: Verify APK signature
        run: |
          APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          unzip -l $APK | grep -E "META-INF.*RSA|META-INF.*SF"
          jarsigner -verify $APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lanzarus-APK
          path: app/build/outputs/apk/release/*.apk
